<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Grading Tool</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;min-height:100vh;padding:2rem 1rem}
.page{max-width:820px;margin:0 auto}
h1{font-size:22px;font-weight:600;color:#222;margin-bottom:0.25rem}
.subtitle{font-size:14px;color:#666;margin-bottom:2rem}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1.5rem;margin-bottom:1.5rem}
.card-title{font-size:16px;font-weight:600;color:#222;margin-bottom:1.25rem;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:#e8f0fe;color:#1a56db}
label{display:block;font-size:13px;color:#555;margin-bottom:5px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type=file],input[type=text],textarea{width:100%;border:1px solid #d0d0d0;border-radius:6px;padding:8px 10px;font-size:14px;color:#222;background:#fff;font-family:inherit}
textarea{min-height:110px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
button{padding:9px 18px;font-size:14px;font-weight:500;cursor:pointer;border-radius:6px;border:1px solid #d0d0d0;background:#fff;color:#222}
button.primary{background:#1a56db;color:#fff;border:none}
button:disabled{opacity:0.6;cursor:not-allowed}
.grade-btn{margin-top:1rem;display:inline-flex;align-items:center;gap:8px}
.spinner{display:none;width:14px;height:14px;border:2px solid #ccc;border-top-color:#1a56db;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:13px;color:#555;margin-top:8px;min-height:18px}
.result-section{display:none}
.result-section.visible{display:block}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.result-header h3{font-size:15px;font-weight:600;color:#222}
.dl-btn{font-size:13px;padding:6px 14px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.metric{background:#f9f9f9;border-radius:8px;padding:0.85rem 1rem;border:1px solid #eee}
.metric-label{font-size:12px;color:#888;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600;color:#222}
.feedback-box{background:#f9f9f9;border-radius:8px;padding:0.85rem 1rem;margin-bottom:1rem;font-size:14px;color:#333;line-height:1.6;border:1px solid #eee}
.points-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.points-card{border-radius:8px;padding:0.85rem 1rem;border:1px solid #eee}
.points-card.awarded{background:#f0faf4;border-color:#b7e4c7}
.points-card.missing{background:#fff5f5;border-color:#f5c6cb}
.points-card-title{font-size:12px;font-weight:600;margin-bottom:8px}
.points-card.awarded .points-card-title{color:#1a7f37}
.points-card.missing .points-card-title{color:#c0392b}
.point-item{font-size:13px;color:#333;padding:4px 0;border-bottom:1px solid #eee;display:flex;align-items:flex-start;gap:6px}
.point-item:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot.green{background:#1a7f37}.dot.red{background:#c0392b}
.toggle-row{display:flex;gap:8px;margin-bottom:1.25rem}
</style>
</head>
<body>
<div class="page">
  <h1>AI Grading Tool</h1>
  <p class="subtitle">Grade student answers against a mark scheme using GPT-4</p>

  <div class="card">
    <div class="card-title">Input <span class="badge" id="mode-badge">PDF mode</span></div>
    <div class="toggle-row">
      <button class="primary" id="btn-pdf" onclick="switchMode('pdf')">Upload PDF</button>
      <button id="btn-text" onclick="switchMode('text')">Enter text</button>
    </div>

    <div id="pdf-input">
      <label>Student answer (PDF)</label>
      <input type="file" id="pdf-file" accept=".pdf">
    </div>
    <div id="text-input" style="display:none">
      <label>Student answer</label>
      <textarea id="text-answer" placeholder="Paste student answer here..."></textarea>
    </div>

    <div class="row">
      <div>
        <label>Mark scheme (JSON)</label>
        <textarea id="ms-json" placeholder='{"question":"...","max_score":5,"marking_points":["point 1","point 2"]}' style="min-height:90px"></textarea>
      </div>
      <div>
        <label>OpenAI API key (optional)</label>
        <input type="text" id="api-key" placeholder="sk-...">
        <label style="margin-top:10px">Output filename (no extension)</label>
        <input type="text" id="out-filename" value="grading_result">
      </div>
    </div>

    <button class="primary grade-btn" id="grade-btn" onclick="runGrade()">
      Grade &amp; save result
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="status" id="status-msg"></div>
  </div>

  <div class="card result-section" id="result-card">
    <div class="result-header">
      <h3>Grading result</h3>
      <button class="dl-btn" onclick="downloadResult()">Download JSON</button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Score</div><div class="metric-value" id="r-score">—</div></div>
      <div class="metric"><div class="metric-label">Max score</div><div class="metric-value" id="r-max">—</div></div>
      <div class="metric"><div class="metric-label">Confidence</div><div class="metric-value" id="r-conf">—</div></div>
    </div>
    <div class="feedback-box" id="r-feedback">—</div>
    <div class="points-grid">
      <div class="points-card awarded">
        <div class="points-card-title">Awarded points</div>
        <div id="r-awarded"></div>
      </div>
      <div class="points-card missing">
        <div class="points-card-title">Missing points</div>
        <div id="r-missing"></div>
      </div>
    </div>
  </div>
</div>

<script>
let currentMode='pdf', lastResult=null, lastFilename='grading_result';

function switchMode(m){
  currentMode=m;
  document.getElementById('pdf-input').style.display=m==='pdf'?'block':'none';
  document.getElementById('text-input').style.display=m==='text'?'block':'none';
  document.getElementById('mode-badge').textContent=m==='pdf'?'PDF mode':'Text mode';
  document.getElementById('btn-pdf').className=m==='pdf'?'primary':'';
  document.getElementById('btn-text').className=m==='text'?'primary':'';
}

async function runGrade(){
  const fd=new FormData();
  const msJson=document.getElementById('ms-json').value.trim();
  const apiKey=document.getElementById('api-key').value.trim();
  const fname=document.getElementById('out-filename').value.trim()||'grading_result';
  lastFilename=fname;
  if(msJson) fd.append('mark_scheme_json',msJson);
  if(apiKey) fd.append('api_key',apiKey);
  fd.append('filename',fname);

  let url;
  if(currentMode==='pdf'){
    const f=document.getElementById('pdf-file').files[0];
    if(!f){setStatus('Please select a PDF file.');return;}
    fd.append('pdf',f);
    url='/grade/pdf';
  } else {
    const ans=document.getElementById('text-answer').value.trim();
    if(!ans){setStatus('Please enter the student answer.');return;}
    fd.append('answer',ans);
    url='/grade/text';
  }

  setLoading(true);
  setStatus('Grading in progress...');
  try{
    const res=await fetch(url,{method:'POST',body:fd});
    const data=await res.json();
    if(data.error){setStatus('Error: '+data.error);setLoading(false);return;}
    lastResult=data;
    renderResult(data);
    setStatus('Done. Result saved to Output_result/'+fname+'.json');
  }catch(e){
    setStatus('Request failed: '+e.message);
  }
  setLoading(false);
}

function renderResult(d){
  document.getElementById('result-card').classList.add('visible');
  document.getElementById('r-score').textContent=d.score;
  document.getElementById('r-max').textContent=d.max_score;
  document.getElementById('r-conf').textContent=Math.round((d.confidence||0)*100)+'%';
  document.getElementById('r-feedback').textContent=d.feedback||'—';
  renderPoints('r-awarded',d.awarded_points||[],'green');
  renderPoints('r-missing',d.missing_points||[],'red');
}

function renderPoints(id,pts,color){
  const el=document.getElementById(id);
  if(!pts.length){el.innerHTML='<div class="point-item" style="color:#888">None</div>';return;}
  el.innerHTML=pts.map(p=>`<div class="point-item"><span class="dot ${color}"></span>${p}</div>`).join('');
}

function downloadResult(){
  if(!lastResult)return;
  const blob=new Blob([JSON.stringify(lastResult,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=lastFilename+'.json';
  a.click();
}

function setStatus(msg){document.getElementById('status-msg').textContent=msg;}
function setLoading(on){
  document.getElementById('spinner').style.display=on?'block':'none';
  document.getElementById('grade-btn').disabled=on;
}
</script>
</body>
</html>
